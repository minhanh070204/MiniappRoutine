                                                const prog = progress[user.id] || {};
                                                return (
                                                    <div key={user.id} onClick={() => setSelectedUser(user)} className={`bg-white p-3.5 rounded-lg shadow-sm border border-slate-200/80 relative cursor-pointer hover:border-blue-300 hover:shadow-md transition group ${prog.tagged && 'opacity-60'}`}>
                                                        
                                                        {prog.tagged && <div className="absolute top-2 right-2 text-green-500"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div>}

                                                        <div className="flex items-start gap-3">
                                                            <div className="w-10 h-10 rounded-full border border-slate-200 shrink-0 relative bg-slate-100">
                                                                <img src={user.avatar} className="w-full h-full rounded-full object-cover" />
                                                                <div className="absolute -bottom-1 -right-1 bg-white rounded-full p-[2px] shadow-sm text-blue-600 border border-slate-100">
                                                                    <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M3 4h18l-7 9v8l-4-2v-6L3 4z"></path></svg>
                                                                </div>
                                                            </div>
                                                            <div className="flex-1 min-w-0 pr-4">
                                                                <h4 className="font-semibold text-slate-800 text-[13.5px] truncate">{user.name}</h4>
                                                                
                                                                <div className="flex flex-wrap gap-1 mt-1.5">
                                                                    {user.tags.map((t, idx) => (
                                                                        <span key={idx} className={`${t.color} text-[10px] items-center flex gap-1 px-1.5 py-0.5 rounded font-bold shadow-sm break-all`}>
                                                                            <IconTag2 /> {t.name}
                                                                        </span>
                                                                    ))}
                                                                    {user.phone && (
                                                                        <span className="bg-slate-100 text-slate-500 text-[10px] items-center flex gap-1 px-1.5 py-0.5 rounded font-bold border border-slate-200">
                                                                            <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> {user.phone}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="mt-3.5 flex items-center justify-between text-[11px] text-slate-400 font-medium pt-2 border-t border-slate-100">
                                                            <span className="flex items-center gap-1.5"><IconClock /> {user.time}</span>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                    
                    {/* ================= MODAL ACTION (THE LOGIC ASSIGN) ================= */}
                    {selectedUser && (
                        <ActionModal 
                            user={selectedUser} 
                            config={segmentConfigs[selectedUser.segment]} 
                            progress={progress[selectedUser.id] || {}}
                            onAction={handleProgress}
                            onClose={() => setSelectedUser(null)} 
                        />
                    )}

                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardBase />);
    </script>
</body>
</html>
